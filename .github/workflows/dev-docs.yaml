name: Dev Docs

# Build and publish the "dev" documentation after the test suite passes on dev.
# It does NOT build wheels or publish to PyPI. Rather than re-run the tests, it
# reuses the single Test run for that commit via workflow_run: when Test
# completes successfully on the dev branch, deploy docs into the /dev/ subdir.

on:
  workflow_run:
    workflows: ["Test"]        # matches the `name:` of test.yaml
    types: [completed]
    branches: [dev]

permissions:
  contents: read

jobs:
  publish_dev_docs:
    name: Build & Publish Dev Docs
    # Only deploy when the tests actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # The deploy script pushes to the gh-pages branch.
    permissions:
      contents: write
    # Share the release docs' deploy lock so a dev push and a release never
    # race on the gh-pages branch.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Build the exact commit that was tested (workflow_run defaults to the
          # default branch otherwise).
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and docs dependencies
        run: uv pip install --system .[docs]

      - name: Build & deploy dev docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PAGES_BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          DOCS_VERSION="dev" DOCS_SWITCHER_URL="$PAGES_BASE/switcher.json" \
            make -C docs html
          bash docs/deploy_versioned_docs.sh "dev" "$PAGES_BASE" docs/build/html
