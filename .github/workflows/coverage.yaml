name: Coverage

# Informational coverage on `dev` only -- NOT a merge gate (C coverage is still
# low). Builds the gcov-instrumented C library, runs the suite once against it to
# collect both C and Python coverage, then publishes the Python badge + both HTML
# reports to the gh-pages /coverage/ subdir. The README badge points at a stable
# URL there, so it auto-updates on GitHub, the docs, and PyPI without a release.
on:
  push:
    branches: [dev]

permissions:
  contents: read

# Share the docs deploy lock: this and dev-docs both write the gh-pages branch,
# so they must serialize (never cancel -- both deploys must complete).
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  coverage:
    name: Coverage (C + Python)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # deploy_coverage.sh pushes to gh-pages
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install the project
        run: uv sync --extra dev

      # Builds build-coverage/ (instrumented), runs pytest against it, and writes
      # coverage.xml + htmlcov/ (Python) and coverage-c.xml + htmlcov-c/ (C).
      - name: Build instrumented C, run tests, collect coverage
        run: bash scripts/coverage.sh --dataset normal

      - name: Assemble the coverage site
        run: |
          mkdir -p pages-coverage
          # Self-contained badge from the Python Cobertura XML (no third party).
          uv run genbadge coverage -i coverage.xml -o pages-coverage/badge.svg
          cp -a htmlcov   pages-coverage/htmlcov
          cp -a htmlcov-c pages-coverage/htmlcov-c

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash docs/deploy_coverage.sh pages-coverage
