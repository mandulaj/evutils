name: Release & Publish Docs

concurrency:
  group: release-pages-${{ github.ref }}
  cancel-in-progress: false

on:
  release:
    # prereleased -> a release published with "pre-release" ticked  -> TestPyPI.
    # released    -> a full release, or a pre-release edited to full -> real PyPI.
    types: [prereleased, released]
  workflow_dispatch:   # manual runs to exercise the multi-OS wheel build without releasing

permissions:
  contents: read
  id-token: write      # Required for trusted PyPI publishing and GitHub Pages deployment
  pages: write         # Required for GitHub Pages deployment

jobs:
  # Gate everything on the test suite -- no wheels/sdist/publish unless it passes.
  test:
    name: Tests
    uses: ./.github/workflows/test.yaml

  # On a real release, fail fast if the tag doesn't match the pyproject version.
  # pyproject.toml is the single source of truth; this catches a forgotten bump
  # before the slow wheel matrix runs. Skipped (job still succeeds) on
  # workflow_dispatch, which has no tag.
  check_version:
    name: Check tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag == pyproject version
        if: github.event_name == 'release'
        run: |
          PYVER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PYVER" != "$TAG" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} (=$TAG) != pyproject version $PYVER"
            exit 1
          fi
          echo "OK: tag and pyproject agree on $TAG"

  build_wheels:
    name: Wheels (${{ matrix.os }})
    needs: [test, check_version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux x86_64 + arm64 | windows amd64 | macOS (arm64 runner builds both
        # arm64 natively and x86_64 via cross-compile -- see CIBW_ARCHS_MACOS).
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (cibuildwheel)
        run: pipx run cibuildwheel --output-dir wheelhouse
        env:
          # requires-python (>=3.10) limits the CPython versions built. Skip
          # musllinux, the 32-bit Windows build (win32 has no SIMD path and no
          # numeric-stack wheels), and the free-threaded (cp*t) builds -> standard
          # 64-bit CPython 3.10-3.14 manylinux/macos/win wheels.
          CIBW_SKIP: "*musllinux* *-win32 cp3*t-*"
          # Build both macOS arches on the arm64 runner (x86_64 is cross-compiled;
          # its wheels can't be test-run here, which is fine -- we don't run tests
          # in cibuildwheel). Ignored on Linux/Windows.
          CIBW_ARCHS_MACOS: "x86_64 arm64"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    needs: [test, check_version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  # Pre-release (staging): publish the exact version to TestPyPI so it can be
  # installed and validated without ever being the default `pip install`. When
  # confirmed, edit the GitHub release to a full release -> publish_pypi runs.
  publish_testpypi:
    name: Publish to TestPyPI (staging)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.prerelease == true
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # A re-fired event (e.g. editing the release) must not hard-fail on an
          # already-uploaded version.
          skip-existing: true

  # Full release: publish to real PyPI. Fires on `released` (a full release, or
  # a pre-release promoted to full).
  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.prerelease == false
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  build_and_publish_docs:
    name: Build & Publish Sphinx Docs
    needs: [test, check_version]
    runs-on: ubuntu-latest
    # Versioned docs are published only for confirmed (full) releases -- a
    # staged pre-release stays on TestPyPI and does not touch the docs site
    # (the /dev/ docs already cover previewing). Root/stable stays honest.
    if: github.event_name == 'release' && github.event.release.prerelease == false
    # The deploy script pushes the built site to the gh-pages branch, so this
    # job needs write access to repo contents (the top-level grant is read).
    permissions:
      contents: write
    # Serialize all gh-pages writes (release docs + dev docs) so concurrent
    # deploys never race on the branch.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and docs dependencies
        # uv compiles the C extension locally and installs dependencies instantly
        run: uv pip install --system .[docs]

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Build & deploy versioned docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}   # release tag, e.g. v0.3.16
        run: |
          PAGES_BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # conf.py reads these to point the version switcher at the shared list
          # and highlight this version.
          DOCS_VERSION="$VERSION" DOCS_SWITCHER_URL="$PAGES_BASE/switcher.json" \
            make -C docs html
          bash docs/deploy_versioned_docs.sh "$VERSION" "$PAGES_BASE" docs/build/html

  # Staged validation: install the exact version from TestPyPI (deps come from
  # real PyPI via the extra index) and run the test suite. Reduced matrix -- the
  # full matrix runs against real PyPI once promoted. Catches install/packaging
  # problems before the version is ever on real PyPI.
  smoke_testpypi:
    name: Smoke test TestPyPI wheel
    needs: publish_testpypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.prerelease == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install evutils from TestPyPI
        shell: bash
        run: |
          # Install into the SAME interpreter that runs pytest below (python -m
          # pip), pulling evutils from TestPyPI and its deps from real PyPI.
          # The retry loop waits for the TestPyPI index to catch up, but MUST
          # fail the step if it never succeeds (else pytest later reports a
          # confusing "No module named pytest").
          VERSION=${GITHUB_REF_NAME#v}
          ok=0
          for i in {1..12}; do
            if python -m pip install \
                 --index-url https://test.pypi.org/simple/ \
                 --extra-index-url https://pypi.org/simple/ \
                 "evutils[test,hdf5,aedat]==$VERSION" --no-cache-dir; then
              ok=1; break
            fi
            echo "Waiting for TestPyPI index..."
            sleep 10
          done
          [ "$ok" = 1 ] || { echo "::error::Failed to install evutils==$VERSION from TestPyPI"; exit 1; }

      - name: Remove local source tree
        shell: bash
        run: rm -rf src/evutils

      - name: Run tests against TestPyPI wheel
        shell: bash
        run: |
          python -m pytest --version   # fail clearly if the extras didn't install
          python -m pytest -s -v tests/

  # Full validation against real PyPI after a confirmed release.
  smoke_pypi:
    name: Smoke test PyPI Wheel (${{ matrix.os }}, Py ${{ matrix.python }})
    needs: publish_pypi
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release' && github.event.release.prerelease == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install evutils from PyPI
        shell: bash
        run: |
          # Retry loop to wait for the PyPI index to update with the new release.
          # GITHUB_REF_NAME is the tag (e.g. v1.0.0); strip the 'v' for pip.
          # Installs into the same interpreter that runs pytest, and fails the
          # step if the install never succeeds.
          VERSION=${GITHUB_REF_NAME#v}
          ok=0
          for i in {1..12}; do
            if python -m pip install "evutils[test,hdf5,aedat]==$VERSION" --no-cache-dir; then
              ok=1; break
            fi
            echo "Waiting for PyPI index..."
            sleep 10
          done
          [ "$ok" = 1 ] || { echo "::error::Failed to install evutils==$VERSION from PyPI"; exit 1; }

      - name: Remove local source tree
        shell: bash
        run: |
          # Remove local source so Python is forced to import from the installed PyPI wheel
          rm -rf src/evutils

      - name: Run tests against PyPI wheel
        shell: bash
        run: |
          python -m pytest --version
          python -m pytest -s -v tests/
