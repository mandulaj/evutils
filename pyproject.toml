[build-system]
requires = [
  "setuptools>=68.2",
  "wheel", 
  "setuptools_scm>=8.1.0",
  "sphynx>=8.0.0",]
build-backend = "setuptools.build_meta"


[project]
name = "evutils"
dynamic = ["version"]
authors = [
  {name = "Jakub Mandula", email = "jakub.mandula@pbl.ee.ethz.ch"},
]
description = "Utilities for event-based vision"
readme = "README.md"
license = {file = "LICENSE"}
dependencies = [
    "numpy>=1.18",
    "torch>=1.6",
    "tqdm>=4.41",
    "matplotlib>=3.1",
    "opencv-python>=4.2",
    "numba>=0.50",
    "h5py>=3.0",
    "hdf5plugin>=4.4",
]
requires-python = ">= 3.9"
keywords = ["events", "dvs", "neuromorphic", "vision", "event-based"]

[tool.setuptools]
package-dir = { "" = "src" }
packages = ["evutils"]


[tool.setuptools_scm]
write_to = "src/evutils/_version.py"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
